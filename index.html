<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optify Brochure</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { width: 100%; height: 100vh; font-family: sans-serif; background: #fff; overflow: hidden; }
        #viewer { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; overflow: auto; }
        canvas { display: block; max-width: 100%; height: auto; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
    <div id="viewer"><canvas id="canvas"></canvas></div>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        
        let pdf = null;
        let currentPage = 1;
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        async function renderPage(num) {
            const page = await pdf.getPage(num);
            const viewport = page.getViewport({ scale: 1.5 });
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            await page.render({ canvasContext: ctx, viewport }).promise;
        }
        
        pdfjsLib.getDocument('documents/Optify_Brochure.pdf').promise.then(doc => {
            pdf = doc;
            renderPage(currentPage);
            
            document.addEventListener('wheel', (e) => {
                e.preventDefault();
                if (e.deltaY > 0 && currentPage < pdf.numPages) {
                    currentPage++;
                    renderPage(currentPage);
                } else if (e.deltaY < 0 && currentPage > 1) {
                    currentPage--;
                    renderPage(currentPage);
                }
            }, { passive: false });
            
            let touchStartY = 0;
            document.addEventListener('touchstart', (e) => {
                touchStartY = e.touches[0].clientY;
            });
            document.addEventListener('touchend', (e) => {
                const diff = touchStartY - e.changedTouches[0].clientY;
                if (diff > 50 && currentPage < pdf.numPages) {
                    currentPage++;
                    renderPage(currentPage);
                } else if (diff < -50 && currentPage > 1) {
                    currentPage--;
                    renderPage(currentPage);
                }
            });
        });
    </script>
</body>
</html>
